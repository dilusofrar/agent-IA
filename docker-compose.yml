services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-ia-ponto
    restart: unless-stopped
    environment:
      PORT: 8000
    command: ["sh", "-c", "uvicorn conferir_ponto.web:app --host 0.0.0.0 --port ${PORT:-8000}"]
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
