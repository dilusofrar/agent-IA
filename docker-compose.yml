services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-ia-ponto
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: ${PORT:-8000}
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    command: sh -c "uvicorn web.app:app --host 0.0.0.0 --port ${PORT:-8000}"
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; port=os.getenv('PORT','8000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
