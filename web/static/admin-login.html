<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Acesso administrativo do painel de apuração." />
  <title>Admin · Apuração de Ponto</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand" aria-label="Apuração de Ponto">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="16" rx="3"></rect>
            <path d="M3 10h18"></path>
            <path d="M8 2v4M16 2v4"></path>
          </svg>
        </span>
        <span class="brand-copy">
          <strong>Apuração de Ponto</strong>
          <small>Painel administrativo</small>
        </span>
      </a>
    </div>
  </header>

  <main class="container main admin-shell">
    <section class="admin-auth-card">
      <span class="eyebrow">Acesso restrito</span>
      <h1>Entrar no painel administrativo</h1>
      <p class="lede">Use suas credenciais para acessar as regras persistentes de apuração em <code>/admin</code>.</p>

      <form id="admin-login-form" class="admin-form" novalidate>
        <label class="admin-field">
          <span>Usuário</span>
          <input id="admin-username" name="username" type="text" autocomplete="username" required />
        </label>

        <label class="admin-field">
          <span>Senha</span>
          <input id="admin-password" name="password" type="password" autocomplete="current-password" required />
        </label>

        <button type="submit" class="btn btn-primary">
          <span class="btn-label">Entrar</span>
        </button>
      </form>

      <div id="admin-login-status" class="status" role="status" aria-live="polite" hidden></div>
    </section>
  </main>

  <script src="/static/admin.js" defer></script>
</body>
</html>
